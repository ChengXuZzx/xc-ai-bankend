      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: qwen3.5-plus
  datasource:
    url: jdbc:mysql://47.109.85.59:13306/xc_ai?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
